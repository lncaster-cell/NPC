name: Docs Guard

on:
  pull_request:
    paths:
      - 'docs/**/*.md'
      - 'README.md'
      - 'scripts/docs_guard.py'
      - '.github/workflows/docs-guard.yml'

jobs:
  docs-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run docs guard
        run: |
          python scripts/docs_guard.py --base origin/${{ github.base_ref }}
