name: Ambient Life Integrity

on:
  pull_request:
    paths:
      - 'scripts/ambient_life/**.py'
      - 'scripts/ambient_life/test_*.py'
      - 'pytest.ini'
      - '.github/workflows/ambient-life-integrity.yml'
  push:
    branches: [ main ]
    paths:
      - 'scripts/ambient_life/**.py'
      - 'scripts/ambient_life/test_*.py'
      - 'pytest.ini'
      - '.github/workflows/ambient-life-integrity.yml'

jobs:
  python-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile ambient life python scripts
        run: python3 -m compileall -q scripts/ambient_life

      - name: Run ambient life python tests
        run: pytest -q scripts/ambient_life
