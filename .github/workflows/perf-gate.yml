name: Ambient Life Perf Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  perf-gate:
    runs-on: ubuntu-latest
    env:
      BASELINE_PATH: docs/perf/baselines/s80_s100_s120_baseline.csv
      PERF_REPORT_PATH: docs/perf/baselines/perf_gate_report.csv
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Ambient Life script changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          CHANGED="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"
          if printf '%s\n' "$CHANGED" | grep -Eq '^scripts/ambient_life/al_'; then
            echo "requires_perf_gate=true" >> "$GITHUB_OUTPUT"
          else
            echo "requires_perf_gate=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.changes.outputs.requires_perf_gate == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate perf report exists
        if: steps.changes.outputs.requires_perf_gate == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f "$PERF_REPORT_PATH" ]]; then
            echo "Missing perf report: $PERF_REPORT_PATH"
            echo "Use template: docs/perf/baselines/perf_gate_report_template.csv or .json"
            exit 1
          fi

      - name: Run perf gate validator
        if: steps.changes.outputs.requires_perf_gate == 'true'
        run: |
          python3 scripts/ambient_life/validate_perf_gate.py \
            --baseline "$BASELINE_PATH" \
            --report "$PERF_REPORT_PATH"

      - name: Skip message for non-Ambient-Life PR
        if: steps.changes.outputs.requires_perf_gate != 'true'
        run: echo "No changes in scripts/ambient_life/al_*; perf gate skipped."
